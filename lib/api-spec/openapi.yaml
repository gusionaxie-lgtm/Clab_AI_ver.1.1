openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Clab AI - MemeCoin Launch Strategist API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat, image, and audio operations
  - name: profiles
    description: User profile management
  - name: projects
    description: Meme coin project management
  - name: scenarios
    description: Launch scenario simulation
  - name: scores
    description: Launch score analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [profiles]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects for current user
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemeProject"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new meme coin project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeProject"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeProject"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/scores:
    get:
      operationId: getProjectScores
      tags: [scores]
      summary: Get launch scores for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Launch scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchScores"
    post:
      operationId: saveProjectScores
      tags: [scores]
      summary: Save launch scores for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveScoresBody"
      responses:
        "201":
          description: Scores saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchScores"

  /projects/{id}/generate:
    post:
      operationId: generateProjectContent
      tags: [projects]
      summary: Generate specific content for a project (name, ticker, lore, roadmap, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateContentBody"
      responses:
        "200":
          description: Generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedContent"

  /projects/{id}/export:
    get:
      operationId: exportLaunchPlan
      tags: [projects]
      summary: Export full launch plan for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full launch plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchPlan"

  /scenarios:
    get:
      operationId: listScenarios
      tags: [scenarios]
      summary: List scenarios for a project
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scenario"
    post:
      operationId: createScenario
      tags: [scenarios]
      summary: Create and simulate a new scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScenarioBody"
      responses:
        "201":
          description: Created scenario with simulation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"

  /scenarios/{id}:
    get:
      operationId: getScenario
      tags: [scenarios]
      summary: Get a specific scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scenario details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
    delete:
      operationId: deleteScenario
      tags: [scenarios]
      summary: Delete a scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [projects]
      summary: Get dashboard summary for current user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOpenaiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOpenaiImageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        budget:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        audience:
          type: string
        timeline:
          type: string
        creatorType:
          type: string
          enum: [builder, casual, agency]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - budget
        - riskLevel
        - audience
        - timeline
        - creatorType
        - createdAt
        - updatedAt

    CreateProfileBody:
      type: object
      properties:
        budget:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        audience:
          type: string
        timeline:
          type: string
        creatorType:
          type: string
          enum: [builder, casual, agency]
      required:
        - budget
        - riskLevel
        - audience
        - timeline
        - creatorType

    MemeProject:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        idea:
          type: string
        name:
          type: string
          nullable: true
        ticker:
          type: string
          nullable: true
        narrative:
          type: string
          nullable: true
        lore:
          type: string
          nullable: true
        roadmap:
          type: string
          nullable: true
        brandVoice:
          type: string
          nullable: true
        launchThread:
          type: string
          nullable: true
        faq:
          type: string
          nullable: true
        riskReport:
          type: string
          nullable: true
        conversationId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - idea
        - createdAt
        - updatedAt

    MemeProjectDetail:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        idea:
          type: string
        name:
          type: string
          nullable: true
        ticker:
          type: string
          nullable: true
        narrative:
          type: string
          nullable: true
        lore:
          type: string
          nullable: true
        roadmap:
          type: string
          nullable: true
        brandVoice:
          type: string
          nullable: true
        launchThread:
          type: string
          nullable: true
        faq:
          type: string
          nullable: true
        riskReport:
          type: string
          nullable: true
        conversationId:
          type: integer
          nullable: true
        scores:
          $ref: "#/components/schemas/LaunchScores"
          nullable: true
        scenarios:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - idea
        - scenarios
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        idea:
          type: string
        name:
          type: string
        ticker:
          type: string
      required:
        - idea

    UpdateProjectBody:
      type: object
      properties:
        idea:
          type: string
        name:
          type: string
        ticker:
          type: string
        narrative:
          type: string
        lore:
          type: string
        roadmap:
          type: string
        brandVoice:
          type: string
        launchThread:
          type: string
        faq:
          type: string
        riskReport:
          type: string

    LaunchScores:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        launchPotential:
          type: number
        originality:
          type: number
        memeStrength:
          type: number
        survivability:
          type: number
        riskScore:
          type: number
        communityPotential:
          type: number
        executionDifficulty:
          type: number
        analysis:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - launchPotential
        - originality
        - memeStrength
        - survivability
        - riskScore
        - communityPotential
        - executionDifficulty
        - createdAt

    SaveScoresBody:
      type: object
      properties:
        launchPotential:
          type: number
        originality:
          type: number
        memeStrength:
          type: number
        survivability:
          type: number
        riskScore:
          type: number
        communityPotential:
          type: number
        executionDifficulty:
          type: number
        analysis:
          type: string
      required:
        - launchPotential
        - originality
        - memeStrength
        - survivability
        - riskScore
        - communityPotential
        - executionDifficulty

    GenerateContentBody:
      type: object
      properties:
        contentType:
          type: string
          enum: [name, ticker, lore, roadmap, brandVoice, launchThread, faq, riskReport, scores]
      required:
        - contentType

    GeneratedContent:
      type: object
      properties:
        contentType:
          type: string
        content:
          type: string
        scores:
          $ref: "#/components/schemas/LaunchScores"
          nullable: true
      required:
        - contentType
        - content

    LaunchPlan:
      type: object
      properties:
        projectId:
          type: integer
        projectName:
          type: string
          nullable: true
        ticker:
          type: string
          nullable: true
        idea:
          type: string
        narrative:
          type: string
          nullable: true
        lore:
          type: string
          nullable: true
        roadmap:
          type: string
          nullable: true
        brandVoice:
          type: string
          nullable: true
        launchThread:
          type: string
          nullable: true
        faq:
          type: string
          nullable: true
        riskReport:
          type: string
          nullable: true
        scores:
          $ref: "#/components/schemas/LaunchScores"
          nullable: true
        scenarios:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
        exportedAt:
          type: string
          format: date-time
      required:
        - projectId
        - idea
        - scenarios
        - exportedAt

    Scenario:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        scenarioType:
          type: string
          enum: [viral_growth, slow_organic, failure, copycat_attack, low_budget, hype_collapse]
        title:
          type: string
        probability:
          type: number
        timeline:
          type: string
          nullable: true
        outcome:
          type: string
        keyFactors:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        outputData:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - scenarioType
        - title
        - probability
        - outcome
        - keyFactors
        - mitigations
        - createdAt

    CreateScenarioBody:
      type: object
      properties:
        projectId:
          type: integer
        scenarioType:
          type: string
          enum: [viral_growth, slow_organic, failure, copycat_attack, low_budget, hype_collapse]
      required:
        - projectId
        - scenarioType

    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        avgLaunchScore:
          type: number
        totalScenarios:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/MemeProject"
        topProject:
          $ref: "#/components/schemas/MemeProject"
          nullable: true
        profileComplete:
          type: boolean
      required:
        - totalProjects
        - avgLaunchScore
        - totalScenarios
        - recentProjects
        - profileComplete

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    GenerateOpenaiImageBody:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt

    GenerateOpenaiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
